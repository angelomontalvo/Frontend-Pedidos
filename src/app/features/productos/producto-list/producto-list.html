<h1 class="text-4xl font-bold text-center text-orange-600 mt-8">Nuestras Pizzas</h1>

<p class="text-center text-gray-500 mt-2 mb-8">Selecciona tus pizzas favoritas</p>

<div class="max-w-7xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
  @for (producto of productos(); track producto.id) {
    <div
      class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300"
    >
      <img [src]="producto.imagen" [alt]="producto.nombre" class="w-full h-52 object-cover" />

      <div class="p-4">
        <h3 class="text-xl font-bold text-gray-800">
          {{ producto.nombre }}
        </h3>

        <p class="text-gray-500 mt-2 h-12 overflow-hidden">
          {{ producto.descripcion }}
        </p>

        <div class="flex justify-between items-center mt-4">
          <span class="text-red-600 font-bold text-lg"> S/. {{ producto.precio }} </span>

          <span class="bg-green-100 text-green-700 text-sm px-3 py-1 rounded-full">
            Stock: {{ producto.stock }}
          </span>
        </div>

        <button
          class="w-full mt-4 bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg font-semibold transition"
        >
          Agregar al carrito
        </button>
      </div>
    </div>
  }
</div>
